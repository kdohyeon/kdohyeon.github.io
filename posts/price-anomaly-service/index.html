<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스타일 탭 서비스 개발 — 김도현</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/main.css" />
  <style>
    .post-header{padding-bottom:36px;border-bottom:1px solid var(--border);margin-bottom:48px;}
    .post-category{font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:500;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
    .post-title{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;letter-spacing:-0.02em;line-height:1.2;margin-bottom:16px;}
    .post-meta{display:flex;flex-wrap:wrap;gap:16px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-muted);}
    .post-meta span{display:flex;align-items:center;gap:5px;}
    .post-body{font-size:0.95rem;color:var(--text-sub);line-height:1.9;}
    .post-body p{margin-bottom:20px;}
    .post-body h2{font-size:1.15rem;font-weight:700;color:var(--text);margin:40px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
    .post-body h3{font-size:1rem;font-weight:700;color:var(--text);margin:28px 0 10px;}
    .post-body ul,.post-body ol{padding-left:20px;margin-bottom:20px;}
    .post-body ul{list-style:disc;}.post-body ol{list-style:decimal;}
    .post-body li{margin-bottom:6px;}
    .post-body strong{color:var(--text);font-weight:600;}
    .post-body code{font-family:'JetBrains Mono',monospace;font-size:0.82em;background:var(--badge-bg);color:var(--accent);padding:2px 6px;border-radius:4px;}
    .post-body pre{background:var(--badge-bg);border:1px solid var(--border);border-radius:8px;padding:20px;overflow-x:auto;margin-bottom:24px;}
    .post-body pre code{background:none;padding:0;font-size:0.84rem;color:var(--text-sub);}
    .post-body blockquote{border-left:3px solid var(--accent);padding-left:16px;margin:24px 0;color:var(--text-muted);font-style:italic;}
    .post-body img{max-width:100%;border-radius:8px;border:1px solid var(--border);margin:8px 0 24px;}
    .placeholder{padding:64px 32px;text-align:center;border:2px dashed var(--border);border-radius:12px;}
    .placeholder-icon{font-size:2rem;margin-bottom:16px;}
    .placeholder-text{font-size:0.9rem;color:var(--text-muted);line-height:1.7;}
    footer{margin-top:60px;}
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-back" href="../../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        김도현
      </a>
      <div class="toggle-wrap">
        <span class="toggle-icon" id="toggle-icon">☀️</span>
        <button class="theme-toggle" id="themeToggle" aria-label="다크모드 전환"></button>
      </div>
    </div>
  </nav>
  <main>
    <div class="container">
      <div class="post-header">
        <p class="post-category">역량 · 서비스 개발</p>
        <h1 class="post-title">통계 기반 상품의 이상 가격 탐지 서비스 개발</h1>
        <div class="post-meta">
          <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>2020. 01 — 2020. 03</span>
          <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 9v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9"/><path d="M9 22V12h6v10M2 10.6L12 2l10 8.6"/></svg>쿠팡 (Coupang)</span>
        </div>
      </div>
      <div class="post-body">
        <div class="placeholder">
          <div class="placeholder-icon">✍️</div>
          <p class="placeholder-text">내용을 작성해 주세요.<br />placeholder div를 삭제하고 내용을 입력하면 됩니다.</p>
        </div>
      </div>
    </div>
  </main>
  <footer><div class="container">© 2025 김도현 · <a href="../../index.html" style="color:inherit">홈으로</a></div></footer>
  <script src="../../assets/js/main.js"></script>
</body>
</html>
